serenity {
    take.screenshots = FOR_EACH_ACTION
    console.colors = true
}

webdriver {
    driver = chrome
    autodownload = true
    capabilities {
        browserName = "chrome"
        acceptInsecureCerts = true
        "goog:chromeOptions" {
            args = [
                "start-maximized",
                "test-type",
                "no-sandbox",
                "lang=es",
                "disable-popup-blocking",
                "disable-download-notification",
                "ignore-certificate-errors",
                "allow-running-insecure-content",
                "disable-translate",
                "always-authorize-plugins",
                "disable-extensions",
                "remote-allow-origins=*",
                "incognito",
                "disable-infobars",
                "disable-gpu"
            ]
        }
    }
}