serenity {
    take.screenshots = FOR_EACH_ACTION
    console.colors = true
    logging = VERBOSE
    # Tiempo de espera por defecto para encontrar elementos
    wait.for.timeout = 10000
}

webdriver {
    driver = chrome
    autodownload = true
    webdriver.wait.for.timeout = 10000
    capabilities {
        browserName = "chrome"
        acceptInsecureCerts = true
        "goog:chromeOptions" {
            args = [
                "start-maximized",
                "test-type",
                "no-sandbox",
                "lang=es",
                "disable-popup-blocking",
                "disable-download-notification",
                "ignore-certificate-errors",
                "allow-running-insecure-content",
                "disable-translate",
                "disable-extensions",
                "remote-allow-origins=*",
                "incognito",
                "disable-infobars",
                "disable-gpu",
                # Agregado para mejorar estabilidad con CDP
                "disable-dev-shm-usage",
                "user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
            ]
            # Desactiva logs internos del motor de Chrome
            excludeSwitches = ["enable-logging"]
        }
    }
}