serenity {
    take.screenshots = FOR_EACH_ACTION
    console.colors = true
    logging = VERBOSE
    wait.for.timeout = 10000
}

webdriver {
    driver = remote
    remote.url = "http://localhost:8085" // Proxy de Healenium que analiza el DOM en tiempo real

    capabilities {
        browserName = "chrome"
        acceptInsecureCerts = true

        "goog:chromeOptions" {
            args = [
                "window-size=1920,1080",
                "lang=es-ES",
                "disable-dev-shm-usage",
                "headless=new",
                "start-maximized",
                "test-type",
                "no-sandbox",
                "ignore-certificate-errors",
                "allow-running-insecure-content",
                "remote-allow-origins=*",
                "incognito",
                "disable-gpu"
            ]
            excludeSwitches = ["enable-logging"]
        }
    }
}