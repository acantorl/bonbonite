
trigger:
  - main

pool:
  vmImage: ubuntu-latest

steps:
  - task: Gradle@3
    displayName: 'Ejecutar Pruebas y Generar Reporte de Serenity'
    inputs:
      gradleWrapperFile: 'gradlew'
      # AGREGADO: Sumamos la tarea 'aggregate' para que Serenity junte los resultados y cree el HTML
      tasks: 'clean test aggregate'
      options: ''
      publishJUnitResults: true
      testResultsFiles: '**/TEST-*.xml'
      javaHomeOption: 'JDKVersion'
      jdkVersionOption: '1.21'
      jdkArchitectureOption: 'x64'
    env:
      GRADLE_OPTS: '-Xmx3072m -XX:MaxMetaspaceSize=512m'

  # NUEVO: Tarea para empaquetar y subir el reporte HTML a la pestaña de Azure DevOps
  - task: PublishPipelineArtifact@1
    displayName: 'Publicar Reporte HTML de Serenity'
    inputs:
      targetPath: 'target/site/serenity' # Ruta estándar donde Serenity guarda el index.html
      artifact: 'SerenityReport'         # Nombre con el que verás el archivo descargable
      publishLocation: 'pipeline'
    # CRÍTICO: Garantiza que el reporte se publique aunque alguna prueba falle
    condition: always()