trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

steps:
  # 1. Compilar y Ejecutar ÚNICAMENTE el feature de búsqueda de producto usando tags de Cucumber
  - task: Gradle@3
    displayName: 'Ejecutar Pruebas de logout'
    inputs:
      gradleWrapperFile: 'gradlew'
      # Filtramos para que corra exclusivamente los escenarios con la etiqueta @Search
      tasks: 'clean test aggregate'
      options: '-Dcucumber.filter.tags="@SuccessfulSearch"'
      publishJUnitResults: true
      testResultsFiles: '**/TEST-*.xml'
      javaHomeOption: 'JDKVersion'
      jdkVersionOption: '1.21'
      jdkArchitectureOption: 'x64'
    env:
      GRADLE_OPTS: '-Xmx3072m -XX:MaxMetaspaceSize=512m'

  # 2. Tarea para empaquetar y subir el reporte HTML a la pestaña de Azure DevOps
  - task: PublishPipelineArtifact@1
    displayName: 'Publicar Reporte HTML de Serenity'
    inputs:
      targetPath: 'target/site/serenity' # Ruta estándar donde Serenity guarda el index.html
      artifact: 'SerenityReport'         # Nombre con el que verás el archivo descargable
      publishLocation: 'pipeline'
    # Garantiza que el reporte se publique aunque alguna prueba falle
    condition: always()