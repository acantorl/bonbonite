trigger:
  - main

pool:
  vmImage: ubuntu-latest

steps:
  - task: Gradle@3
    inputs:
      gradleWrapperFile: 'gradlew'
      # Se mantiene intacta tu tarea con el tag que ya funciona
      tasks: 'clean test -Dcucumber.filter.tags="@SuccessfulLogin"'
      publishJUnitResults: true
      testResultsFiles: '**/TEST-*.xml'
      javaHomeOption: 'JDKVersion'
      jdkVersionOption: '1.21'
      jdkArchitectureOption: 'x64'
    env:
      GRADLE_OPTS: '-Xmx3072m -XX:MaxMetaspaceSize=512m'

  # REEMPLAZO: Tarea nativa de Azure para publicar el reporte de Serenity
  - task: PublishPipelineArtifact@1
    displayName: 'Publicar Reporte HTML de Serenity'
    inputs:
      targetPath: 'target/site/serenity' # Ruta donde Serenity genera el HTML
      artifact: 'SerenityReport'         # Nombre del contenedor en Azure
      publishLocation: 'pipeline'
    condition: always() # Se ejecuta siempre, sin importar si los tests pasaron o fallaron