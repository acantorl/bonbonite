trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

steps:
  # 1. Levantar la infraestructura de IA (Healenium Backend + Selector Emulator)
  - script: |
      docker run -d --name hlm-db -p 5432:5432 -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=healenium postgres:15-alpine
      docker run -d --name hlm-backend -p 8085:8085 --link hlm-db:db -e SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/healenium healenium/hlm-backend:3.4.3
    displayName: 'Inicializar Servidor de Auto-Curación e IA Predictiva'

  # 2. Compilar y Ejecutar Automatización con Gradle
  - task: Gradle@3
    displayName: 'Ejecutar Pruebas y Auto-curar Selectores Rotos'
    inputs:
      gradleWrapperFile: 'gradlew'
      tasks: 'clean test aggregate'
      publishJUnitResults: true
      testResultsFiles: '**/TEST-*.xml'
      javaHomeOption: 'JDKVersion'
      jdkVersionOption: '1.21'
      jdkArchitectureOption: 'x64'
    env:
      GRADLE_OPTS: '-Xmx3072m -XX:MaxMetaspaceSize=512m'

  # 3. Publicar el Reporte de Serenity en Azure Artifacts
  - task: PublishPipelineArtifact@1
    displayName: 'Publicar Reporte Estadístico de Serenity'
    inputs:
      targetPath: 'target/site/serenity'
      artifact: 'SerenityReport'
      publishLocation: 'pipeline'
    condition: always()

  # 4. Habilitar la analítica predictiva integrada de Azure DevOps para clasificar Bugs vs Inestabilidad (Flakiness)
  - task: PublishTestResults@2
    displayName: 'Analizar e Identificar Flaky Tests con Azure DevOps Test Analytics'
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/TEST-*.xml'
      mergeTestResults: true
      failTaskOnFailedTests: true
    condition: always()